name: Build Codex Portable

on:
  workflow_dispatch:
    inputs:
      codex_version:
        description: 'Codex CLI version (e.g. rust-v0.133.0). Empty = latest release.'
        required: false
        default: ''
      cc_switch_version:
        description: 'cc-switch version tag (e.g. v3.10.0). Empty = latest.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Codex version
        id: codex_ver
        run: |
          if [ -n "${{ github.event.inputs.codex_version }}" ]; then
            echo "tag=${{ github.event.inputs.codex_version }}" >> $GITHUB_OUTPUT
          else
            tag=$(curl -sL https://api.github.com/repos/openai/codex/releases/latest | jq -r '.tag_name')
            echo "tag=$tag" >> $GITHUB_OUTPUT
          fi

      - name: Resolve cc-switch version
        id: ccs_ver
        run: |
          if [ -n "${{ github.event.inputs.cc_switch_version }}" ]; then
            echo "tag=${{ github.event.inputs.cc_switch_version }}" >> $GITHUB_OUTPUT
          else
            tag=$(curl -sL https://api.github.com/repos/farion1231/cc-switch/releases/latest | jq -r '.tag_name')
            echo "tag=$tag" >> $GITHUB_OUTPUT
          fi

      - name: Download Codex binaries
        env:
          CODEX_TAG: ${{ steps.codex_ver.outputs.tag }}
        run: |
          set -e
          mkdir -p bin/macos-arm64 bin/macos-x64 bin/linux-x64 bin/windows-x64
          BASE="https://github.com/openai/codex/releases/download/${CODEX_TAG}"

          # macOS arm64
          curl -fsSL "${BASE}/codex-aarch64-apple-darwin.tar.gz" | tar -xz -C bin/macos-arm64
          # macOS x64
          curl -fsSL "${BASE}/codex-x86_64-apple-darwin.tar.gz" | tar -xz -C bin/macos-x64
          # Linux x64 (musl, statically linked)
          curl -fsSL "${BASE}/codex-x86_64-unknown-linux-musl.tar.gz" | tar -xz -C bin/linux-x64
          # Windows x64
          curl -fsSL -o /tmp/codex-win.tar.gz "${BASE}/codex-x86_64-pc-windows-msvc.exe.tar.gz"
          tar -xzf /tmp/codex-win.tar.gz -C bin/windows-x64

          # The release archives may extract a binary named with the target triple. Normalize.
          for d in bin/macos-arm64 bin/macos-x64 bin/linux-x64; do
            if [ ! -f "$d/codex" ]; then
              found=$(find "$d" -maxdepth 2 -type f -name 'codex*' ! -name '*.tar*' | head -1 || true)
              [ -n "$found" ] && mv "$found" "$d/codex"
            fi
            chmod +x "$d/codex" 2>/dev/null || true
          done
          if [ ! -f bin/windows-x64/codex.exe ]; then
            found=$(find bin/windows-x64 -maxdepth 2 -type f -name '*.exe' | head -1 || true)
            [ -n "$found" ] && mv "$found" bin/windows-x64/codex.exe
          fi

          ls -la bin/*/

      - name: Download cc-switch binaries
        run: |
          set -e
          BASE="https://github.com/yuluyangguang1/codex-portable/releases/download/cc-switch-assets"

          # macOS (universal binary, same file for arm64 and x64)
          curl -fsSL -o bin/macos-arm64/cc-switch "${BASE}/cc-switch-macos"
          curl -fsSL -o bin/macos-x64/cc-switch "${BASE}/cc-switch-macos"
          chmod +x bin/macos-arm64/cc-switch bin/macos-x64/cc-switch

          # Linux x64
          curl -fsSL -o bin/linux-x64/cc-switch "${BASE}/cc-switch-linux-x64"
          chmod +x bin/linux-x64/cc-switch

          # Windows x64
          curl -fsSL -o bin/windows-x64/cc-switch.exe "${BASE}/cc-switch-windows-x64.exe"

          # Verify integrity
          curl -fsSL -o /tmp/SHA256SUMS "${BASE}/SHA256SUMS"
          ( cd bin/macos-arm64    && shasum -a 256 -c <(grep cc-switch-macos          /tmp/SHA256SUMS | sed 's|cc-switch-macos|cc-switch|') )
          ( cd bin/linux-x64      && shasum -a 256 -c <(grep cc-switch-linux-x64      /tmp/SHA256SUMS | sed 's|cc-switch-linux-x64|cc-switch|') )
          ( cd bin/windows-x64    && shasum -a 256 -c <(grep cc-switch-windows-x64    /tmp/SHA256SUMS | sed 's|cc-switch-windows-x64.exe|cc-switch.exe|') )

          ls -lh bin/*/cc-switch* | awk '{print $5, $NF}'

      - name: Download Python embeddable (Windows only)
        run: |
          set -e
          # Python 3.12 embeddable for Windows x64 (~10MB, no install needed)
          PYTHON_VER="3.12.10"
          curl -fsSL -o /tmp/python-embed.zip "https://www.python.org/ftp/python/${PYTHON_VER}/python-${PYTHON_VER}-embed-amd64.zip"
          mkdir -p bin/windows-x64/python
          unzip -q /tmp/python-embed.zip -d bin/windows-x64/python

          # Enable pip/site by uncommenting import site in python312._pth
          sed -i 's/^#import site/import site/' bin/windows-x64/python/python312._pth 2>/dev/null || true

          # Install pip (required for config_server.py dependencies)
          curl -fsSL -o /tmp/get-pip.py https://bootstrap.pypa.io/get-pip.py
          bin/windows-x64/python/python.exe /tmp/get-pip.py --no-warn-script-location 2>/dev/null || true

          ls -lh bin/windows-x64/python/python.exe

      - name: Download Python standalone (macOS + Linux)
        run: |
          set -e
          # python-build-standalone by astral-sh — fully self-contained, no system deps
          # File names include +DATE suffix (e.g. cpython-3.12.10+202****0409-...), so we
          # resolve the exact URL via GitHub API instead of hardcoding.
          PBS_TAG="20250409"
          PBS_BASE="https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_TAG}"

          resolve_asset() {
            local pattern="$1"
            # Use GitHub API (unauthenticated) to find asset by glob pattern
            local name
            name=$(curl -sL "https://api.github.com/repos/astral-sh/python-build-standalone/releases/tags/${PBS_TAG}" \
              | python3 -c "import sys,json; [print(a['name']) for a in json.load(sys.stdin).get('assets',[])]" \
              | grep "$pattern" | head -1)
            if [ -z "$name" ]; then
              echo "  [!] Asset not found: $pattern" >&2
              return 1
            fi
            echo "${PBS_BASE}/${name}"
          }

          download_and_wrap() {
            local plat="$1" pattern="$2"
            local url
            url=$(resolve_asset "$pattern")
            echo "  Downloading: $url"
            curl -fsSL "$url" | tar -xz -C "bin/$plat"
            mv "bin/$plat/python" "bin/$plat/python3-bin" 2>/dev/null || true
            cat > "bin/$plat/python3" <<'WRAP'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          exec "$DIR/python3-bin/bin/python3" "$@"
          WRAP
            chmod +x "bin/$plat/python3"
          }

          download_and_wrap macos-arm64  "aarch64-apple-darwin-install_only_stripped\.tar\.gz$"
          download_and_wrap macos-x64    "x86_64-apple-darwin-install_only_stripped\.tar\.gz$"
          download_and_wrap linux-x64    "x86_64-unknown-linux-gnu-install_only_stripped\.tar\.gz$"

          ls -lh bin/macos-arm64/python3 bin/macos-x64/python3 bin/linux-x64/python3

      - name: Set version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "${GITHUB_REF#refs/tags/}" > VERSION
          else
            echo "version=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Build per-platform packages
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          set -e

          # macOS arm64
          mkdir -p dist/CodexPortable-macos-arm64
          rsync -a --exclude='bin' --exclude='dist' --exclude='.git*' . dist/CodexPortable-macos-arm64/
          rm -rf dist/CodexPortable-macos-arm64/bin
          mkdir -p dist/CodexPortable-macos-arm64/bin/macos-arm64
          cp bin/macos-arm64/codex bin/macos-arm64/cc-switch dist/CodexPortable-macos-arm64/bin/macos-arm64/
          cp bin/macos-arm64/python3 dist/CodexPortable-macos-arm64/bin/macos-arm64/ 2>/dev/null || true
          cp -r bin/macos-arm64/python3-bin dist/CodexPortable-macos-arm64/bin/macos-arm64/ 2>/dev/null || true
          chmod +x dist/CodexPortable-macos-arm64/bin/macos-arm64/codex dist/CodexPortable-macos-arm64/bin/macos-arm64/cc-switch

          # macOS x64
          mkdir -p dist/CodexPortable-macos-x64
          rsync -a --exclude='bin' --exclude='dist' --exclude='.git*' . dist/CodexPortable-macos-x64/
          rm -rf dist/CodexPortable-macos-x64/bin
          mkdir -p dist/CodexPortable-macos-x64/bin/macos-x64
          cp bin/macos-x64/codex bin/macos-x64/cc-switch dist/CodexPortable-macos-x64/bin/macos-x64/
          cp bin/macos-x64/python3 dist/CodexPortable-macos-x64/bin/macos-x64/ 2>/dev/null || true
          cp -r bin/macos-x64/python3-bin dist/CodexPortable-macos-x64/bin/macos-x64/ 2>/dev/null || true
          chmod +x dist/CodexPortable-macos-x64/bin/macos-x64/codex dist/CodexPortable-macos-x64/bin/macos-x64/cc-switch

          # Linux x64
          mkdir -p dist/CodexPortable-linux-x64
          rsync -a --exclude='bin' --exclude='dist' --exclude='.git*' . dist/CodexPortable-linux-x64/
          rm -rf dist/CodexPortable-linux-x64/bin
          mkdir -p dist/CodexPortable-linux-x64/bin/linux-x64
          cp bin/linux-x64/codex bin/linux-x64/cc-switch dist/CodexPortable-linux-x64/bin/linux-x64/
          cp bin/linux-x64/python3 dist/CodexPortable-linux-x64/bin/linux-x64/ 2>/dev/null || true
          cp -r bin/linux-x64/python3-bin dist/CodexPortable-linux-x64/bin/linux-x64/ 2>/dev/null || true
          chmod +x dist/CodexPortable-linux-x64/bin/linux-x64/codex dist/CodexPortable-linux-x64/bin/linux-x64/cc-switch

          # Windows x64
          mkdir -p dist/CodexPortable-windows-x64
          rsync -a --exclude='bin' --exclude='dist' --exclude='.git*' . dist/CodexPortable-windows-x64/
          rm -rf dist/CodexPortable-windows-x64/bin
          mkdir -p dist/CodexPortable-windows-x64/bin/windows-x64
          cp bin/windows-x64/codex.exe bin/windows-x64/cc-switch.exe dist/CodexPortable-windows-x64/bin/windows-x64/
          cp -r bin/windows-x64/python dist/CodexPortable-windows-x64/bin/windows-x64/ 2>/dev/null || true

          # All-platforms package (all 4 platform binaries in one zip)
          mkdir -p dist/CodexPortable-all-platforms/bin/{macos-arm64,macos-x64,linux-x64,windows-x64}
          rsync -a --exclude='bin' --exclude='dist' --exclude='.git*' . dist/CodexPortable-all-platforms/
          for plat in macos-arm64 macos-x64 linux-x64; do
            cp bin/$plat/codex bin/$plat/cc-switch dist/CodexPortable-all-platforms/bin/$plat/
            chmod +x dist/CodexPortable-all-platforms/bin/$plat/codex dist/CodexPortable-all-platforms/bin/$plat/cc-switch
            cp bin/$plat/python3 dist/CodexPortable-all-platforms/bin/$plat/ 2>/dev/null || true
            cp -r bin/$plat/python3-bin dist/CodexPortable-all-platforms/bin/$plat/ 2>/dev/null || true
          done
          cp bin/windows-x64/codex.exe bin/windows-x64/cc-switch.exe dist/CodexPortable-all-platforms/bin/windows-x64/
          cp -r bin/windows-x64/python dist/CodexPortable-all-platforms/bin/windows-x64/ 2>/dev/null || true

          # Convert Windows scripts to CRLF (.bat/.vbs must have \r\n)
          find dist/CodexPortable-windows-x64 dist/CodexPortable-all-platforms \
            -maxdepth 2 \( -name "*.bat" -o -name "*.vbs" \) -exec sed -i 's/$/\r/' {} + 2>/dev/null || true
          echo "  [ok] CRLF converted for .bat/.vbs"

          # Zip them
          cd dist
          for d in CodexPortable-*; do
            zip -r "${d}-${VER}.zip" "$d" > /dev/null
            echo "  packed ${d}-${VER}.zip"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-portable-${{ steps.ver.outputs.version }}
          path: dist/*.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body: |
            Codex CLI Portable
            - Codex version: ${{ steps.codex_ver.outputs.tag }}
            - Build version: ${{ steps.ver.outputs.version }}

            **Bundled:** Codex CLI binary + cc-switch GUI.

            | Package | Platform |
            |---------|----------|
            | `CodexPortable-macos-arm64` | Apple Silicon Mac |
            | `CodexPortable-macos-x64` | Intel Mac |
            | `CodexPortable-linux-x64` | Linux x86_64 |
            | `CodexPortable-windows-x64` | Windows x86_64 |
            | `CodexPortable-all-platforms` | All of the above |

            Download the zip for your platform (or `all-platforms` for USB distribution),
            extract anywhere, and double-click the launcher:

            - macOS:   `CodexPortable.command`
            - Linux:   `./CodexPortable.sh`
            - Windows: `CodexPortable.bat`
